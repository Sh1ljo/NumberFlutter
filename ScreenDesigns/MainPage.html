</div>
</header>
<div class="bg-[#1b1b1b] h-[2px] w-full"></div>

<!-- Central Counter -->
<div class="relative z-10 flex flex-col items-center select-none">
<span class="font-['Manrope'] font-bold text-[12px] tracking-[0.5em] uppercase text-outline mb-4">Current Value</span>
<div class="font-['Space_Grotesk'] font-black display-lg tracking-tighter text-primary">
                1,492.65
            </div>
<div class="flex items-center gap-4 mt-2">
<span class="font-['Manrope'] font-medium text-[11px] tracking-widest text-primary/40 uppercase">Quadrillion</span>
<div class="w-24 h-[2px] bg-surface-container-highest">
<div class="h-full bg-primary w-3/4"></div>
</div>
</div>
</div>
<!-- Main Interaction Area -->
<div class="mt-24 relative group">
<button class="relative z-10 w-48 h-48 bg-primary rounded-full flex items-center justify-center transition-all duration-200 active:scale-90 hover:shadow-[0_0_50px_rgba(255,255,255,0.1)]">
<span class="material-symbols-outlined text-on-primary text-5xl" style="font-variation-settings: 'FILL' 1;">add</span>
</button>
<!-- Aesthetic Pulse Ring -->
<div class="absolute inset-0 border border-primary/20 rounded-full animate-ping scale-110 opacity-20 pointer-events-none"></div>
</div>
<!-- Indicators Asymmetric Layout -->
<div class="absolute bottom-12 left-12 flex flex-col gap-8 w-64">
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="font-['Manrope'] font-bold text-[10px] tracking-widest uppercase text-outline">Generator Alpha</span>
<span class="font-['Space_Grotesk'] text-sm text-primary font-bold">+12.4/s</span>
</div>
<div class="w-full h-1 bg-surface-container-low">
<div class="h-full bg-primary/40 w-2/3"></div>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<span class="font-['Manrope'] font-bold text-[10px] tracking-widest uppercase text-outline">System Pulse</span>
<span class="font-['Space_Grotesk'] text-sm text-primary font-bold">88%</span>
</div>
<div class="w-full h-1 bg-surface-container-low">
<div class="h-full bg-primary/40 w-[88%]"></div>
</div>
</div>
</div>
<div class="absolute top-12 right-12 text-right hidden md:block">
<div class="font-['Space_Grotesk'] text-4xl font-light text-primary/20 leading-none">PRECISION<br/>INSTRUMENT</div>
<div class="mt-4 font-['Manrope'] text-[9px] tracking-[0.4em] uppercase text-outline">Ver. 0.9.44_BETA</div>
</div>

<span class="font-['Manrope'] font-medium text-[10px] tracking-[0.2em] uppercase">SYSTEM</span>
</a>
